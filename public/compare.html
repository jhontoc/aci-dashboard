<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ACI Dashboard — Compare</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top Bar ── */
    .topbar {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 52px;
      flex-shrink: 0;
    }

    .topbar-left  { display: flex; align-items: center; gap: 10px; }
    .topbar-right { display: flex; align-items: center; gap: 8px; }
    .topbar-title { font-size: 0.95rem; font-weight: 700; color: #58a6ff; }

    .btn {
      border: none; border-radius: 6px;
      padding: 7px 14px; font-size: 0.8rem; font-weight: 600;
      cursor: pointer; display: flex; align-items: center;
      gap: 6px; transition: background 0.2s; white-space: nowrap;
    }

    .btn-load   { background: #21262d; color: #c9d1d9; border: 1px solid #30363d; }
    .btn-load:hover { background: #30363d; }
    .btn-export { background: #21262d; color: #3fb950; border: 1px solid #238636; }
    .btn-export:hover { background: #0a1a0d; }
    .btn-back   { background: transparent; color: #8b949e; border: 1px solid #30363d; }
    .btn-back:hover { color: #c9d1d9; }
    .btn-cancel { background: #21262d; color: #8b949e; border: 1px solid #30363d; }
    .btn-cancel:hover { background: #30363d; }
    .btn-confirm {
      background: #238636; color: #fff; border: none;
    }
    .btn-confirm:hover:not(:disabled) { background: #2ea043; }
    .btn-confirm:disabled {
      background: #21262d; color: #484f58; cursor: not-allowed;
    }

    /* ── Snapshot info bar ── */
    .info-bar {
      background: #0d1117;
      border-bottom: 1px solid #30363d;
      padding: 6px 20px;
      display: flex;
      align-items: center;
      gap: 16px;
      font-size: 0.75rem;
      color: #6e7681;
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .info-bar .info-item { display: flex; align-items: center; gap: 5px; }
    .info-bar .info-val  { color: #c9d1d9; font-weight: 600; }

    /* ── Node Nav Bar ── */
    #nodeNav {
      background: #161b22;
      border-bottom: 1px solid #30363d;
      padding: 0 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      height: 44px;
      flex-shrink: 0;
      overflow-x: auto;
    }

    .nav-label {
      font-size: 0.72rem; color: #6e7681;
      text-transform: uppercase; letter-spacing: 0.5px;
      margin-right: 4px; white-space: nowrap;
    }

    /* ── Split wrapper ── */
    .split-wrapper {
      flex: 1;
      overflow: hidden;
      display: flex;
      position: relative;
    }

    /* ── Diff Summary Bar ── */
    .diff-bar {
      background: #161b22;
      border-top: 1px solid #30363d;
      padding: 7px 20px;
      display: flex;
      align-items: center;
      gap: 20px;
      font-size: 0.75rem;
      flex-shrink: 0;
    }

    .diff-stat  { display: flex; align-items: center; gap: 5px; }
    .dot        { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
    .dot-changed  { background: #d29922; }
    .dot-added    { background: #3fb950; }
    .dot-removed  { background: #f85149; }
    .dot-match    { background: #484f58; }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.75); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal-box {
      background: #161b22; border: 1px solid #30363d;
      border-radius: 10px; width: 600px; max-width: 95vw;
      max-height: 85vh; display: flex; flex-direction: column;
      box-shadow: 0 16px 48px rgba(0,0,0,0.6);
    }

    .modal-header {
      padding: 18px 22px 14px;
      border-bottom: 1px solid #30363d;
      display: flex; align-items: center;
      justify-content: space-between; flex-shrink: 0;
    }

    .modal-header h2 { font-size: 0.95rem; font-weight: 700; color: #c9d1d9; }

    .modal-close {
      background: none; border: none; color: #6e7681;
      font-size: 1.1rem; cursor: pointer;
      padding: 2px 6px; border-radius: 4px; line-height: 1;
    }
    .modal-close:hover { background: #21262d; color: #c9d1d9; }

    .snapshot-list-wrap { overflow-y: auto; flex: 1; padding: 10px; }

    .snapshot-item {
      padding: 11px 14px; border-radius: 6px;
      border: 1px solid #30363d; background: #0d1117;
      margin-bottom: 8px; cursor: pointer;
      transition: border-color 0.15s, background 0.15s;
      display: flex; align-items: center;
      justify-content: space-between; gap: 12px;
    }
    .snapshot-item:hover  { border-color: #58a6ff; background: #0f1923; }
    .snapshot-item.selected { border-color: #238636; background: #0a1a0d; }

    .s-name {
      font-family: 'Courier New', monospace;
      font-size: 0.78rem; color: #c9d1d9; word-break: break-all;
    }
    .s-meta { font-size: 0.7rem; color: #6e7681; margin-top: 3px; }

    .s-commands {
      display: flex; gap: 5px; flex-wrap: wrap; margin-top: 5px;
    }
    .s-cmd-tag {
      font-size: 0.65rem; padding: 1px 6px; border-radius: 4px;
      background: rgba(88,166,255,0.1); color: #58a6ff;
      border: 1px solid rgba(88,166,255,0.2);
      font-family: 'Courier New', monospace;
    }

    .s-check {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid #30363d; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; transition: all 0.15s;
    }
    .snapshot-item.selected .s-check {
      background: #238636; border-color: #238636; color: #fff;
    }

    .modal-footer {
      padding: 14px 22px; border-top: 1px solid #30363d;
      display: flex; justify-content: flex-end; gap: 10px; flex-shrink: 0;
    }

    /* ── Spinner ── */
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid #30363d; border-top-color: #58a6ff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 20px; right: 20px;
      background: #161b22; border: 1px solid #30363d;
      border-radius: 8px; padding: 10px 16px;
      font-size: 0.82rem; color: #c9d1d9; z-index: 300;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      opacity: 0; transform: translateY(10px);
      transition: opacity 0.25s, transform 0.25s;
      pointer-events: none;
    }
    .toast.show    { opacity: 1; transform: translateY(0); }
    .toast.success { border-left: 3px solid #3fb950; }
    .toast.error   { border-left: 3px solid #f85149; }
    .toast.info    { border-left: 3px solid #58a6ff; }
  </style>
</head>
<body>

  <!-- ── Top Bar ─────────────────────────────────────────── -->
  <div class="topbar">
    <div class="topbar-left">
      <span class="topbar-title">⬡ ACI Compare</span>
      <button class="btn btn-back"
              onclick="window.location.href='/selector.html'">← Back</button>
      <button class="btn btn-load" onclick="openLoadModal()">
        📂 Load Snapshot
      </button>
    </div>
    <div class="topbar-right">
      <button class="btn btn-export" onclick="exportSnapshot()">
        ⬇ Export .tar
      </button>
    </div>
  </div>

  <!-- ── Snapshot Info Bar ───────────────────────────────── -->
  <div class="info-bar" id="infoBar" style="display:none;">
    <div class="info-item">
      📄 <span class="info-val" id="infoFile">—</span>
    </div>
    <div class="info-item">
      🕐 <span class="info-val" id="infoTime">—</span>
    </div>
    <div class="info-item">
      ⚙ Commands:&nbsp;<span class="info-val" id="infoCmds">—</span>
    </div>
    <div class="info-item">
      🖥 Nodes:&nbsp;<span class="info-val" id="infoNodes">—</span>
    </div>
  </div>

  <!-- ── Node Nav ────────────────────────────────────────── -->
  <div id="nodeNav">
    <span class="nav-label">Node:</span>
    <span style="color:#484f58; font-size:0.78rem; margin-left:4px;">
      Load a snapshot to begin
    </span>
  </div>

  <!-- ── Split Pane ──────────────────────────────────────── -->
  <div class="split-wrapper" id="splitWrapper"></div>

  <!-- ── Diff Summary Bar ────────────────────────────────── -->
  <div class="diff-bar">
    <div class="diff-stat">
      <span class="dot dot-changed"></span>
      <span id="statChanged">0 changed</span>
    </div>
    <div class="diff-stat">
      <span class="dot dot-added"></span>
      <span id="statAdded">0 added</span>
    </div>
    <div class="diff-stat">
      <span class="dot dot-removed"></span>
      <span id="statRemoved">0 removed</span>
    </div>
    <div class="diff-stat">
      <span class="dot dot-match"></span>
      <span id="statMatch">0 matching</span>
    </div>
  </div>

  <!-- ── Load Modal ──────────────────────────────────────── -->
  <div class="modal-overlay" id="loadModal">
    <div class="modal-box">
      <div class="modal-header">
        <h2>📂 Load Snapshot</h2>
        <button class="modal-close" onclick="closeLoadModal()">✕</button>
      </div>
      <div class="snapshot-list-wrap" id="snapshotListWrap"></div>
      <div class="modal-footer">
        <button class="btn btn-cancel" onclick="closeLoadModal()">Cancel</button>
        <button class="btn btn-confirm" id="btnConfirmLoad"
                onclick="confirmLoad()" disabled>
          Load Selected
        </button>
      </div>
    </div>
  </div>

  <!-- ── Toast ───────────────────────────────────────────── -->
  <div class="toast" id="toast"></div>

  <script src="/components/split-pane.js"></script>
  <script src="/components/node-nav.js"></script>

  <script>
    // ── Session ──────────────────────────────────────────────
    const session = JSON.parse(
      sessionStorage.getItem('aci_session') || 'null'
    );

    // ── State ────────────────────────────────────────────────
    let snapshotData  = null;   // full loaded snapshot
    let liveDataStore = {};     // { cmdKey: { nodeId: data } }
    let currentNodeId = null;
    let selectedFile  = null;

    // ── Toast ────────────────────────────────────────────────
    function showToast(msg, type = 'info', ms = 3000) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className   = `toast ${type} show`;
      clearTimeout(t._t);
      t._t = setTimeout(() => t.classList.remove('show'), ms);
    }

    // ────────────────────────────────────────────────────────
    //  LOAD MODAL
    // ────────────────────────────────────────────────────────
    async function openLoadModal() {
      selectedFile = null;
      document.getElementById('btnConfirmLoad').disabled = true;
      document.getElementById('loadModal').classList.add('open');

      const wrap = document.getElementById('snapshotListWrap');
      wrap.innerHTML = `
        <div style="padding:24px; text-align:center; color:#8b949e;">
          <span class="spinner"></span>&nbsp; Loading…
        </div>`;

      try {
        const res   = await fetch('/api/snapshots');
        if (!res.ok) throw new Error(`Server ${res.status}`);
        const files = await res.json();

        if (!Array.isArray(files) || files.length === 0) {
          wrap.innerHTML = `
            <div style="padding:32px; text-align:center; color:#484f58;">
              <div style="font-size:2rem; margin-bottom:8px;">📭</div>
              No snapshots found. Run a collection first.
            </div>`;
          return;
        }

        wrap.innerHTML = '';

        files.forEach(entry => {
          const filename  = typeof entry === 'string' ? entry : String(entry.filename || '');
          if (!filename) return;

          const command   = entry.command   || '';
          const commands  = entry.commands  ||
            (command ? [command] : []);
          const timestamp = entry.timestamp
            ? new Date(entry.timestamp).toLocaleString()
            : '—';
          const nodeCount = entry.nodeCount != null ? entry.nodeCount : '—';
          const sizeKB    = entry.sizeBytes
            ? (entry.sizeBytes / 1024).toFixed(1) + ' KB'
            : '';

          const item = document.createElement('div');
          item.className    = 'snapshot-item';
          item.dataset.file = filename;

          // Build command tags HTML
          const tagsHtml = commands
            .map(c => `<span class="s-cmd-tag">${c.replace(/_/g,' ')}</span>`)
            .join('');

          item.innerHTML = `
            <div style="flex:1; min-width:0;">
              <div class="s-name">${filename}</div>
              <div class="s-meta">
                ${timestamp}
                &nbsp;·&nbsp; ${nodeCount} node(s)
                ${sizeKB ? '&nbsp;·&nbsp;' + sizeKB : ''}
              </div>
              ${tagsHtml ? `<div class="s-commands">${tagsHtml}</div>` : ''}
            </div>
            <div class="s-check">✓</div>
          `;

          item.addEventListener('click', function () {
            document.querySelectorAll('.snapshot-item')
              .forEach(el => el.classList.remove('selected'));
            this.classList.add('selected');
            selectedFile = this.dataset.file;
            document.getElementById('btnConfirmLoad').disabled = false;
          });

          wrap.appendChild(item);
        });

      } catch (err) {
        wrap.innerHTML = `
          <div style="padding:20px; color:#f85149; font-size:0.82rem;">
            ⚠ ${err.message}
          </div>`;
        console.error('[openLoadModal]', err);
      }
    }

    function closeLoadModal() {
      document.getElementById('loadModal').classList.remove('open');
    }

    document.getElementById('loadModal').addEventListener('click', function (e) {
      if (e.target === this) closeLoadModal();
    });

    // ────────────────────────────────────────────────────────
    //  CONFIRM LOAD
    // ────────────────────────────────────────────────────────
    async function confirmLoad() {
      if (!selectedFile) return;

      const btn = document.getElementById('btnConfirmLoad');
      btn.disabled  = true;
      btn.innerHTML = '<span class="spinner"></span>&nbsp; Loading…';

      try {
        const res = await fetch(
          `/api/snapshots/${encodeURIComponent(selectedFile)}`
        );
        if (!res.ok) throw new Error(`Server ${res.status}`);

        snapshotData = await res.json();

        // Support both unified { nodes: { nodeId: { cmdKey: data } } }
        // and legacy single-command { nodes: { nodeId: { ...data } } }
        if (!snapshotData?.nodes) {
          throw new Error('Snapshot missing "nodes" structure.');
        }

        const nodeIds  = Object.keys(snapshotData.nodes);
        if (nodeIds.length === 0) throw new Error('Snapshot has no node data.');

        // Reset live store for new snapshot
        liveDataStore = {};

        // Update info bar
        const cmds = snapshotData.commands || [snapshotData.command] || [];
        document.getElementById('infoFile').textContent =
          selectedFile.length > 50
            ? '…' + selectedFile.slice(-48)
            : selectedFile;
        document.getElementById('infoTime').textContent =
          snapshotData.timestamp
            ? new Date(snapshotData.timestamp).toLocaleString()
            : '—';
        document.getElementById('infoCmds').textContent =
          cmds.map(c => c.replace(/_/g,' ')).join(', ');
        document.getElementById('infoNodes').textContent =
          nodeIds.join(', ');
        document.getElementById('infoBar').style.display = 'flex';

        // Init node navigation
        NodeNav.init(nodeIds, onNodeChange);

        closeLoadModal();
        showToast(`Loaded: ${selectedFile}`, 'success');

      } catch (err) {
        showToast(`Load failed: ${err.message}`, 'error', 5000);
        console.error('[confirmLoad]', err);
        btn.disabled  = false;
        btn.innerHTML = 'Load Selected';
      }
    }

    // ────────────────────────────────────────────────────────
    //  NODE CHANGE
    // ────────────────────────────────────────────────────────
    function onNodeChange(nodeId) {
      currentNodeId = nodeId;
      renderComparison();
    }

    // ────────────────────────────────────────────────────────
    //  RENDER COMPARISON — full re-render on node change
    // ────────────────────────────────────────────────────────
    function renderComparison() {
      if (!snapshotData || !currentNodeId) return;

      const cmds         = snapshotData.commands || [snapshotData.command];
      const leftNodeData = snapshotData.nodes[currentNodeId] || {};

      // Merge live data for this node
      const rightNodeData = {};
      cmds.forEach(cmd => {
        if (liveDataStore[cmd]?.[currentNodeId]) {
          rightNodeData[cmd] = liveDataStore[cmd][currentNodeId];
        }
      });

      const leftTs  = snapshotData.timestamp
        ? new Date(snapshotData.timestamp).toLocaleString()
        : '';

      const totals = SplitPane.render(
        document.getElementById('splitWrapper'),
        leftNodeData,
        Object.keys(rightNodeData).length > 0 ? rightNodeData : null,
        {
          commands:  cmds,
          timestamps: { left: leftTs, right: '' },
          onRunLive: session ? handleRunLive : null
        }
      );

      updateDiffBar(totals);
    }

    // ────────────────────────────────────────────────────────
    //  RUN LIVE — per command block
    // ────────────────────────────────────────────────────────
    async function handleRunLive(cmdKey, btnEl) {
      if (!session || !snapshotData || !currentNodeId) return;

      btnEl.disabled  = true;
      btnEl.innerHTML = '<span class="spinner"></span> Collecting…';

      const nodeIds = Object.keys(snapshotData.nodes);

      try {
        const response = await fetch('/api/commands/run', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            apicIp:   session.apicIp,
            username: session.username,
            password: session.password,
            nodeIds,
            commands: [cmdKey]   // run only this command
          })
        });

        if (!response.ok) throw new Error(`Server ${response.status}`);

        const reader  = response.body.getReader();
        const decoder = new TextDecoder();
        let   buffer  = '';

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop();

          for (const line of lines) {
            const cleaned = line.replace(/^data:\s*/, '').trim();
            if (!cleaned) continue;

            try {
              const parsed = JSON.parse(cleaned);

              if (parsed.snapshot_saved) {
                // Load the saved snapshot to extract live node data
                const r2 = await fetch(
                  `/api/snapshots/${encodeURIComponent(parsed.snapshot_saved)}`
                );
                const liveSnap = await r2.json();

                // Store per-command live data for all nodes
                if (!liveDataStore[cmdKey]) liveDataStore[cmdKey] = {};

                nodeIds.forEach(nid => {
                  const nodeEntry = liveSnap.nodes?.[nid];
                  if (nodeEntry) {
                    // Unified format: nodes[nodeId][cmdKey]
                    liveDataStore[cmdKey][nid] =
                      nodeEntry[cmdKey] ?? nodeEntry;
                  }
                });

                // Update only the live pane for this command
                const liveNodeEntry = liveDataStore[cmdKey][currentNodeId];
                const leftNodeData  = snapshotData.nodes[currentNodeId] || {};
                const rightForCmd   = liveNodeEntry
                  ? { [cmdKey]: liveNodeEntry }
                  : null;

                const stats = SplitPane.updateLivePane(
                  cmdKey,
                  leftNodeData,
                  rightForCmd,
                  new Date(liveSnap.timestamp).toLocaleString()
                );

                // Recalculate totals across all commands for this node
                recalcTotals();

                showToast(
                  `Live data collected for ${cmdKey.replace(/_/g,' ')}`,
                  'success'
                );
              }
            } catch { /* non-JSON progress lines */ }
          }
        }

      } catch (err) {
        showToast(`Live run failed: ${err.message}`, 'error', 5000);
        console.error('[handleRunLive]', err);
      } finally {
        btnEl.disabled  = false;
        btnEl.innerHTML = '▶ Run Live';
      }
    }

    // ── Recalculate totals from current live store ────────────
    function recalcTotals() {
      if (!snapshotData || !currentNodeId) return;

      const cmds         = snapshotData.commands || [snapshotData.command];
      const leftNodeData = snapshotData.nodes[currentNodeId] || {};
      const totals       = { changed: 0, added: 0, removed: 0, matching: 0 };

      cmds.forEach(cmd => {
        const liveEntry = liveDataStore[cmd]?.[currentNodeId];
        if (!liveEntry) return;

        const leftFlat  = flattenSimple(leftNodeData[cmd]  || {});
        const rightFlat = flattenSimple(liveEntry);

        const allKeys = new Set([
          ...Object.keys(leftFlat),
          ...Object.keys(rightFlat)
        ]);

        for (const key of allKeys) {
          const lv = leftFlat[key];
          const rv = rightFlat[key];
          if      (lv === undefined) totals.added++;
          else if (rv === undefined) totals.removed++;
          else if (lv !== rv)        totals.changed++;
          else                       totals.matching++;
        }
      });

      updateDiffBar(totals);
    }

  function flattenSimple(obj, prefix) {
  prefix = prefix || '';
  var out = {};

  var entries = Object.entries(obj || {});
  for (var i = 0; i < entries.length; i++) {
    var k   = entries[i][0];
    var v   = entries[i][1];
    var key = prefix ? prefix + '.' + k : k;

    if (v !== null && v !== undefined && typeof v === 'object' && !Array.isArray(v)) {
      var nested = flattenSimple(v, key);
      var nestedKeys = Object.keys(nested);
      for (var j = 0; j < nestedKeys.length; j++) {
        out[nestedKeys[j]] = nested[nestedKeys[j]];
      }
    } else {
      // ── Fix: replace v ?? '' with explicit null/undefined check ──
      var safeVal = (v !== null && v !== undefined) ? v : '';
      out[key] = Array.isArray(v) ? JSON.stringify(v) : String(safeVal);
    }
  }
  return out;
}

    function updateDiffBar(totals) {
      document.getElementById('statChanged').textContent =
        `${totals.changed} changed`;
      document.getElementById('statAdded').textContent =
        `${totals.added} added`;
      document.getElementById('statRemoved').textContent =
        `${totals.removed} removed`;
      document.getElementById('statMatch').textContent =
        `${totals.matching} matching`;
    }

    // ────────────────────────────────────────────────────────
    //  EXPORT
    // ────────────────────────────────────────────────────────
    async function exportSnapshot() {
      if (!selectedFile) {
        showToast('Load a snapshot first to export it.', 'info');
        return;
      }
      showToast('Preparing export…', 'info', 2000);
      try {
        const res = await fetch('/api/snapshots/export', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ files: [selectedFile] })
        });
        if (!res.ok) {
          const e = await res.json();
          throw new Error(e.error || `Export failed (${res.status})`);
        }
        const blob   = await res.blob();
        const url    = URL.createObjectURL(blob);
        const anchor = document.createElement('a');
        anchor.href     = url;
        anchor.download = `aci_export_${Date.now()}.tar`;
        document.body.appendChild(anchor);
        anchor.click();
        document.body.removeChild(anchor);
        URL.revokeObjectURL(url);
        showToast('Export downloaded.', 'success');
      } catch (err) {
        showToast(`Export failed: ${err.message}`, 'error', 5000);
      }
    }

    // ── Initial empty render ──────────────────────────────────
    SplitPane.render(
      document.getElementById('splitWrapper'),
      null, null, {}
    );
  </script>
</body>
</html>
